<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Missão Semanal">
<title>Missão Semanal</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#090b10;--bg2:#0f1219;--bg3:#161b26;--bg4:#1c2231;
  --gold:#e8b730;--gold-soft:#f5d370;--gold-glow:rgba(232,183,48,.12);--gold-border:rgba(232,183,48,.25);
  --green:#34d399;--green-bg:rgba(52,211,153,.08);--green-border:rgba(52,211,153,.25);
  --blue:#5b9cf5;--blue-bg:rgba(91,156,245,.08);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.08);
  --red:#f87171;--red-bg:rgba(248,113,113,.08);
  --cyan:#22d3ee;
  --text:#e4e2df;--text2:#8b919e;--text3:#565c6a;
  --border:rgba(255,255,255,.05);--border2:rgba(255,255,255,.09);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html{background:var(--bg)}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;overflow-x:hidden;
  padding-top:var(--safe-top);
  padding-bottom:calc(var(--safe-bottom) + 20px);
}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(232,183,48,.04) 0%,transparent 60%);pointer-events:none;z-index:0}

.wrap{max-width:520px;margin:0 auto;padding:28px 16px 60px;position:relative;z-index:1}

/* HEADER */
.head{text-align:center;margin-bottom:32px}
.head h1{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--gold);letter-spacing:5px;text-transform:uppercase}
.head p{color:var(--text3);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-top:5px}

/* HERO */
.hero{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:24px 24px 20px;margin-bottom:14px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--purple),var(--cyan),transparent)}
.hero-inner{display:flex;gap:20px;align-items:center;margin-bottom:18px}
.ring-box{position:relative;width:88px;height:88px;flex-shrink:0}
.ring-box svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring-track{fill:none;stroke:var(--bg4);stroke-width:5}
.ring-fill{fill:none;stroke:var(--gold);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)}
.ring-avatar{position:absolute;inset:7px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:34px}
.hero-info{flex:1;min-width:0}
.hero-name{font-family:'Cinzel',serif;font-size:20px;font-weight:600;margin-bottom:2px}
.hero-class{font-size:11px;color:var(--gold);font-weight:500;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px}
.xp-track{background:var(--bg4);border-radius:8px;height:10px;overflow:hidden;margin-bottom:6px}
.xp-fill{height:100%;min-height:10px;border-radius:8px;background:linear-gradient(90deg,#b8860b,var(--gold),var(--gold-soft));-webkit-transition:width 1.2s cubic-bezier(.4,0,.2,1);transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.xp-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}
.xp-labels b{color:var(--gold-soft);font-weight:500}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.st{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 8px;text-align:center}
.st-v{font-family:'Cinzel',serif;font-size:22px;font-weight:700;line-height:1}
.st-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.c1{color:var(--gold)}.c2{color:var(--green)}.c3{color:var(--blue)}.c4{color:var(--purple)}

/* LEVEL PATH */
.path-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:18px 16px;margin-bottom:20px}
.sec-title{font-family:'Cinzel',serif;font-size:11px;color:var(--text3);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:14px}
.path{display:flex;align-items:flex-end;gap:3px}
.pn{flex:1;text-align:center}
.pn-dot{width:100%;aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid var(--border);background:var(--bg3);transition:all .5s}
.pn.now .pn-dot{border-color:var(--gold-border);background:var(--gold-glow);box-shadow:0 0 18px rgba(232,183,48,.15)}
.pn.was .pn-dot{border-color:var(--green-border);background:var(--green-bg)}
.pn.locked .pn-dot{opacity:.3}
.pn-name{font-size:8px;color:var(--text3);margin-top:4px;letter-spacing:.3px;line-height:1.2}
.pn.now .pn-name{color:var(--gold);font-weight:500}
.conn{flex-shrink:0;width:6px;margin-bottom:20px;display:flex;align-items:center}
.conn span{height:2px;width:100%;background:var(--border);border-radius:1px;display:block}
.conn.lit span{background:var(--green-border)}

/* QUESTS */
.q-section{margin-bottom:20px}
.week-head{font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.week-head::after{content:'';flex:1;height:1px;background:var(--border)}

.q{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:8px;display:flex;gap:14px;cursor:pointer;transition:border-color .25s,opacity .3s,transform .15s;position:relative;overflow:hidden;-webkit-user-select:none;user-select:none}
.q:active{transform:scale(.98)}
.q.done{opacity:.5}
.q.done::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--green);border-radius:3px 0 0 3px}
.q-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--text3);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .25s;font-size:13px;color:transparent;flex-shrink:0}
.q.done .q-check{border-color:var(--green);background:var(--green);color:#fff}
.q-body{flex:1;min-width:0}
.q-top{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.q-icon{font-size:18px;flex-shrink:0}
.q-title{font-weight:500;font-size:14px;line-height:1.3}
.q.done .q-title{text-decoration:line-through;text-decoration-color:var(--text3)}
.q-desc{font-size:12px;color:var(--text2);line-height:1.55;margin-bottom:8px}
.q-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:9px;padding:3px 9px;border-radius:5px;font-weight:500;letter-spacing:.3px}
.tag-e{background:rgba(52,211,153,.1);color:var(--green)}
.tag-m{background:var(--blue-bg);color:var(--blue)}
.tag-d{background:var(--red-bg);color:var(--red)}
.tag-xp{background:var(--gold-glow);color:var(--gold)}
.tag-duo{background:var(--purple-bg);color:var(--purple)}
.q-crit{font-size:11px;color:var(--text3);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);line-height:1.5}
.q-crit b{color:var(--text2);font-weight:500}

/* RESET */
.reset-wrap{text-align:center;margin-top:4px}
.reset-btn{background:none;border:1px solid var(--border);color:var(--text3);font-size:10px;padding:8px 18px;border-radius:8px;cursor:pointer;letter-spacing:1.2px;text-transform:uppercase;transition:all .3s;font-family:'DM Sans',sans-serif}
.reset-btn:active{border-color:var(--red);color:var(--red)}

/* TOAST */
.toast{position:fixed;bottom:calc(24px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg3);border:1px solid var(--gold-border);border-radius:12px;padding:13px 22px;font-size:13px;color:var(--gold-soft);opacity:0;transition:all .4s cubic-bezier(.4,0,.2,1);pointer-events:none;z-index:100;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeIn .5s ease both}
.a1{animation-delay:.05s}.a2{animation-delay:.1s}.a3{animation-delay:.18s}.a4{animation-delay:.25s}
</style>
</head>
<body>
<div class="wrap">
  <div class="head anim">
    <h1>Missão Semanal</h1>
    <p>Evolução pessoal em modo RPG</p>
  </div>

  <div class="hero anim a1">
    <div class="hero-inner">
      <div class="ring-box">
        <svg viewBox="0 0 88 88"><circle class="ring-track" cx="44" cy="44" r="39"/><circle class="ring-fill" id="ringFill" cx="44" cy="44" r="39"/></svg>
        <div class="ring-avatar" id="avatar">🗡️</div>
      </div>
      <div class="hero-info">
        <div class="hero-name">Thiago</div>
        <div class="hero-class" id="className">Aprendiz</div>
        <div class="xp-track"><div class="xp-fill" id="xpFill"></div></div>
        <div class="xp-labels"><span><b id="xpNow">0</b> XP</span><span id="xpGoal">Próximo: 500 XP</span></div>
      </div>
    </div>
  </div>

  <div class="stats anim a2">
    <div class="st"><div class="st-v c1" id="sXP">0</div><div class="st-l">XP total</div></div>
    <div class="st"><div class="st-v c2" id="sDone">0</div><div class="st-l">Feitos</div></div>
    <div class="st"><div class="st-v c3" id="sPend">0</div><div class="st-l">Abertos</div></div>
    <div class="st"><div class="st-v c4" id="sWeek">0</div><div class="st-l">Semanas</div></div>
  </div>

  <div class="path-box anim a3">
    <div class="sec-title">Jornada</div>
    <div class="path" id="pathMap"></div>
  </div>

  <div class="q-section anim a4">
    <div class="sec-title" style="margin-bottom:14px">Missões</div>
    <div id="questBox"></div>
  </div>

  <div class="reset-wrap">
    <button class="reset-btn" onclick="resetAll()">Resetar progresso</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ==============================================
   MISSÕES — edite aqui para adicionar semanas
   ============================================== */
const QUESTS = [
  {
    week:1, id:"s1_corpo", area:"Saúde & corpo", icon:"💪",
    title:"Corpo em movimento",
    desc:"Faça pelo menos 20 minutos de atividade física em 3 dias diferentes essa semana. Caminhada, academia, subir escada — vale tudo que te tirar do lugar.",
    diff:"Fácil", xp:100, duo:true,
    duoTip:"Convide a namorada pra uma caminhada num dos dias.",
    criteria:"3 dias com atividade física feita."
  },
  {
    week:1, id:"s1_financas", area:"Finanças", icon:"💰",
    title:"Raio-X de um gasto",
    desc:"Escolha uma categoria de gasto que te incomoda (assinaturas, delivery, lazer) e anote quanto gastou nela nos últimos 30 dias. Só olhar e registrar — sem cortar nada ainda.",
    diff:"Fácil", xp:100, duo:false, duoTip:"",
    criteria:"Número anotado e categoria identificada."
  },
  {
    week:1, id:"s1_mente", area:"Mente & equilíbrio", icon:"🧠",
    title:"Desconecta por 1 hora",
    desc:"Passe 1 hora inteira sem celular, redes sociais ou telas de entretenimento. Leia, pense, ande, fique no teto — o que quiser, mas sem scroll.",
    diff:"Médio", xp:200, duo:true,
    duoTip:"Jantar ou passeio sem celular com a namorada. Vira programa e desafio ao mesmo tempo.",
    criteria:"1 hora corrida sem telas, sem exceção."
  }
];
/* ============================================== */

const LEVELS=[
  {name:"Aprendiz",   min:0,    max:499,   emoji:"🗡️"},
  {name:"Aventureiro", min:500,  max:1199,  emoji:"🏹"},
  {name:"Explorador",  min:1200, max:2499,  emoji:"🧭"},
  {name:"Veterano",    min:2500, max:4499,  emoji:"⚔️"},
  {name:"Mestre",      min:4500, max:7499,  emoji:"👑"},
  {name:"Lendário",    min:7500, max:99999, emoji:"🐉"}
];

/* Storage com fallback para iOS file:// e data: contexts */
const SK = "msemanal_v3";
function loadDone() {
  try {
    const raw = localStorage.getItem(SK);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  /* fallback: cookie */
  try {
    const m = document.cookie.match(/msemanal=([^;]+)/);
    if (m) return JSON.parse(decodeURIComponent(m[1]));
  } catch(e) {}
  return [];
}
function saveDone(arr) {
  try { localStorage.setItem(SK, JSON.stringify(arr)); return; } catch(e) {}
  /* fallback: cookie (valid 1 year) */
  try {
    const exp = new Date(Date.now() + 365*24*3600*1000).toUTCString();
    document.cookie = "msemanal=" + encodeURIComponent(JSON.stringify(arr)) + "; expires=" + exp + "; path=/";
  } catch(e) {}
}

function getLevel(xp) {
  for (let i = LEVELS.length-1; i >= 0; i--) if (xp >= LEVELS[i].min) return {...LEVELS[i], idx:i};
  return {...LEVELS[0], idx:0};
}
function calcXP(done) {
  return QUESTS.filter(q => done.includes(q.id)).reduce((s,q) => s+q.xp, 0);
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2400);
}

function toggle(id) {
  let done = loadDone();
  const prevLvl = getLevel(calcXP(done));
  if (done.includes(id)) { done = done.filter(d => d !== id); }
  else { done.push(id); }
  saveDone(done);
  const newLvl = getLevel(calcXP(done));
  render();
  if (newLvl.idx > prevLvl.idx) showToast("🎉 Level up! Você é " + newLvl.name + "!");
  else if (!done.includes(id)) showToast("Missão desmarcada");
  else { const q = QUESTS.find(q => q.id===id); showToast("+" + (q?q.xp:0) + " XP conquistado!"); }
}

function render() {
  const done = loadDone();
  const xp = calcXP(done);
  const lvl = getLevel(xp);
  const weeks = [...new Set(QUESTS.map(q => q.week))];

  /* stats */
  document.getElementById("sXP").textContent   = xp;
  document.getElementById("sDone").textContent  = done.length;
  document.getElementById("sPend").textContent  = QUESTS.length - done.length;
  document.getElementById("sWeek").textContent  = weeks.length;

  /* hero */
  document.getElementById("avatar").textContent    = lvl.emoji;
  document.getElementById("className").textContent = lvl.name;
  const inLvl = xp - lvl.min, range = lvl.max - lvl.min + 1;
  const pct = Math.min((inLvl/range)*100, 100);
  const xpFill = document.getElementById("xpFill");
  xpFill.style.transition = "none";
  xpFill.style.width = "0%";
  xpFill.getBoundingClientRect(); /* força reflow no Safari */
  xpFill.style.transition = "";
  requestAnimationFrame(() => { xpFill.style.width = pct + "%"; });
  document.getElementById("xpNow").textContent  = xp;
  const nxt = LEVELS[lvl.idx+1];
  document.getElementById("xpGoal").textContent = nxt ? "Próximo: " + nxt.min + " XP" : "Nível máximo! 🐉";

  /* ring */
  const C = 2*Math.PI*39;
  const circ = document.getElementById("ringFill");
  circ.style.strokeDasharray  = C;
  circ.style.strokeDashoffset = C - (pct/100)*C;

  /* path */
  document.getElementById("pathMap").innerHTML = LEVELS.map((l,i) => {
    let cls = "pn";
    if (i===lvl.idx) cls+=" now"; else if (i<lvl.idx) cls+=" was"; else cls+=" locked";
    const conn = i>0 ? '<div class="conn'+(i<=lvl.idx?" lit":"")+'"><span></span></div>' : "";
    return conn + '<div class="'+cls+'"><div class="pn-dot">'+l.emoji+'</div><div class="pn-name">'+l.name+'</div></div>';
  }).join('');

  /* quests */
  const grouped = {};
  QUESTS.forEach(q => { if (!grouped[q.week]) grouped[q.week]=[]; grouped[q.week].push(q); });
  document.getElementById("questBox").innerHTML = Object.keys(grouped).sort((a,b)=>b-a).map(w => {
    return '<div class="week-head">Semana ' + w + '</div>' + grouped[w].map(q => {
      const d = done.includes(q.id);
      const dc = q.diff==="Fácil"?"tag-e": q.diff==="Médio"?"tag-m":"tag-d";
      return '<div class="q'+(d?" done":"")+'" onclick="toggle(\''+q.id+'\')">'
        + '<div class="q-check">'+(d?"✓":"")+'</div>'
        + '<div class="q-body">'
          + '<div class="q-top"><span class="q-icon">'+q.icon+'</span><span class="q-title">'+q.title+'</span></div>'
          + '<div class="q-desc">'+q.desc+'</div>'
          + '<div class="q-tags">'
            + '<span class="tag '+dc+'">'+q.diff+'</span>'
            + '<span class="tag tag-xp">'+q.xp+' XP</span>'
            + (q.duo ? '<span class="tag tag-duo">Em dupla ❤️</span>' : '')
          + '</div>'
          + '<div class="q-crit"><b>Concluído quando:</b> '+q.criteria
            + (q.duo && q.duoTip ? '<br><b>Dica em dupla:</b> '+q.duoTip : '')
          + '</div>'
        + '</div></div>';
    }).join('');
  }).join('');
}

function resetAll() {
  if (confirm("Resetar todo o progresso? Isso zera XP e desmarca todas as missões.")) {
    saveDone([]);
    render();
    showToast("Progresso resetado");
  }
}

/* Primeira abertura: marca Raio-X como já concluído */
(function(){
  const d = loadDone();
  if (d.length === 0) { saveDone(["s1_financas"]); }
})();

render();
</script>
</body>
</html>
